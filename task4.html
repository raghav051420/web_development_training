<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }
        .container{
            width:1000px;
            height: 215px;
            border: 3px solid black;
            margin: 30px;
            padding-top: 4px;
            padding-left: 4px;
            padding-right: 4px;            
        }
        .box1{
            width: 30px;
            height: 30px;
            border: 3px solid black;
            float: left;
    
        }
        .box2{
            width: 30px;
            height: 30px;
            border: 3px solid black;
            float:right;
          
        }
        .box3{
            width: 30px;
            height: 30px;
            border: 3px solid black;
             
        }
        .box4{
           width: 995px;
           height: 50px;
           border: 3px solid black;
           margin-top: 25px;
           padding-bottom: 25px;
           padding-top: 20px;

           
        }
        .mid1{
             width: 400px;
           height: 45px;
           border: 3px solid black;
           float: left;
           margin-left: 20px;
           border-radius: 20px 20px 20px 20px;
        
    
        }
        .mid2{
             width: 400px;
           height: 45px;
           border: 3px solid black;
           float: right;
           margin-right: 20px;
           border-radius: 20px 20px 20px 20px;
        }
        .box5{
            width: 30px;
            height: 30px;
            border: 3px solid black;
            float: left;
            margin-bottom: 10px;
            margin-bottom: 40px;
           
        }
        .box6{
            width: 30px;
            height: 30px;
            border: 3px solid black;
             float:right;
             
            
        }
        .box7{
            width: 30px;
            height: 30px;
            border: 3px solid black;
            
        }
        .clear_all{
            clear: both;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box1"></div>
        <div class="box2"></div>
        <center><div class="box3"></div></center>
        
        <div class="box4">
            <div class="mid1" ></div>
            <div class="mid2"></div>
        </div>
        <br class="clear-all">
        <div class="box5"></div>
        <div class="box6"></div>
        <center><div class="box7"></div></center>
        <br class="clear-all">
    </div>
</body>
</html>
